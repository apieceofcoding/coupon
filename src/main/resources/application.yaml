spring:
  application:
    name: coupon
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/coupon}
    username: ${SPRING_DATASOURCE_USERNAME:coupon}
    password: ${SPRING_DATASOURCE_PASSWORD:coupon}
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    # 부하 테스트 시 stdout 동기 IO 가 응답 latency 에 박히므로 끔.
    # 로컬 디버깅이 필요하면 일시적으로 true 로 바꿔서 확인.
    show-sql: false
  mvc:
    problemdetails:
      enabled: true
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer
      acks: "1"
    consumer:
      group-id: issuance-worker
      # 부하 테스트/로컬 편의용. 운영에서는 "latest" 또는 "none" 으로 바꿀 것.
      # (현재 KafkaConfig 가 ConsumerFactory 를 직접 만들기 때문에 이 값은 사실상
      # 미사용이지만, 의도를 yaml 에도 남겨둔다.)
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # ErrorHandlingDeserializer 로 감싸야 깨진 payload 가 DLT 로 정상 격리된다.
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JacksonJsonDeserializer
        spring.json.trusted.packages: "com.apiece.coupon.infrastructure.messaging"
        spring.json.value.default.type: com.apiece.coupon.infrastructure.messaging.IssuanceRequested
    listener:
      ack-mode: record

coupon:
  cache:
    # 쿠폰 캐시 TTL. stampede 측정 시 1000 (1초) 으로 오버라이드.
    ttl-ms: ${COUPON_CACHE_TTL_MS:10000}
    # SWR fresh 윈도우 (ttl-ms 보다 짧게). 이 안: 즉시 반환, 넘으면 stale + 백그라운드 갱신.
    fresh-ms: ${COUPON_CACHE_FRESH_MS:500}
    # DB latency 시뮬레이션 (테스트용). loader 안에서 Thread.sleep. 0=비활성.
    simulated-load-latency-ms: ${COUPON_CACHE_SIMULATED_LOAD_LATENCY_MS:0}
  sold-out:
    # 매진 플래그의 Redis TTL. 이벤트 종료까지 살아 있어야 하므로 충분히 길게.
    ttl-seconds: ${COUPON_SOLD_OUT_TTL_SECONDS:86400}
    # Application fast-path (Caffeine) TTL. 1 초가 표준. Redis EXISTS 호출이
    # 인스턴스 당 초당 1 회로 떨어진다. 매진 직후 1 초까지 false negative 허용.
    fast-path-ttl-ms: ${COUPON_SOLD_OUT_FAST_PATH_TTL_MS:1000}

logging:
  level:
    # 같은 이유로 부하 측정용 로그 레벨. 디버깅 시 DEBUG/TRACE 로 일시 상향.
    com.apiece.coupon: INFO
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN
